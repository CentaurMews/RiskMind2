kind = "web"
previewPath = "/"
title = "RiskMind"
version = "1.0.0"
id = "artifacts/riskmind-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19534
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/riskmind-app run dev"

[services.env]
PORT = "19534"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/riskmind-app", "run", "build"]
publicDir = "artifacts/riskmind-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
