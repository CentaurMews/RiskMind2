openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.3.0
  description: RiskMind API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: risks
    description: Risk register operations
  - name: treatments
    description: Risk treatment operations
  - name: kris
    description: Key Risk Indicator operations
  - name: incidents
    description: Incident operations
  - name: reviews
    description: Review cycle operations
  - name: vendors
    description: Third-party vendor operations
  - name: questionnaires
    description: Vendor questionnaire operations
  - name: documents
    description: Vendor document operations
  - name: frameworks
    description: Compliance framework operations
  - name: controls
    description: Control operations
  - name: controlTests
    description: Control test operations
  - name: compliance
    description: Compliance scoring and gap analysis
  - name: signals
    description: Signal ingestion and triage operations
  - name: findings
    description: Finding management operations
  - name: alerts
    description: Alert and monitoring operations
  - name: aiEnrichment
    description: AI enrichment and document summarization
  - name: jobs
    description: Async job status tracking
  - name: mcp
    description: MCP (Model Context Protocol) Streamable HTTP endpoint for AI agent integrations
  - name: foresight
    description: Foresight features (not yet implemented)
  - name: users
    description: User management operations
  - name: settings
    description: LLM provider configuration and platform settings
  - name: interviews
    description: AI-powered interview sessions for risk creation and control assessment
  - name: agent
    description: Autonomous Risk Intelligence Agent — runs, findings, queue, and configuration
paths:
  /v1/health:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health and database connectivity status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Degraded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /v1/auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      description: Authenticate with email and password, returns JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RFC7807Error"

  /v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh token
      description: Exchange a refresh token for new access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Tokens refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPair"
        "401":
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RFC7807Error"

  /v1/auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      description: Returns the authenticated user's profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RFC7807Error"

  /v1/risks:
    get:
      operationId: listRisks
      tags: [risks]
      summary: List risks
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: "Comma-separated risk statuses to filter by (draft,open,mitigated,accepted,closed)"
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/RiskCategory"
        - name: ownerId
          in: query
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
        - name: severity
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
          description: "Filter by computed severity (likelihood × impact): low 1-4, medium 5-9, high 10-16, critical 17-25"
        - name: treatmentStrategy
          in: query
          schema:
            type: string
          description: "Comma-separated treatment strategies to filter by (treat,transfer,tolerate,terminate)"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated list of risks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskListResponse"
    post:
      operationId: createRisk
      tags: [risks]
      summary: Create risk
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRiskRequest"
      responses:
        "201":
          description: Risk created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Risk"

  /v1/risks/heatmap:
    get:
      operationId: getRiskHeatmap
      tags: [risks]
      summary: Risk heatmap data
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Heatmap cells
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeatmapResponse"

  /v1/risks/{id}:
    get:
      operationId: getRisk
      tags: [risks]
      summary: Get risk by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Risk details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Risk"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateRisk
      tags: [risks]
      summary: Update risk
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRiskRequest"
      responses:
        "200":
          description: Risk updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Risk"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteRisk
      tags: [risks]
      summary: Delete risk
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Risk deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/risks/{riskId}/sources:
    get:
      operationId: listRiskSources
      tags: [risks]
      summary: List sources for a risk
      security:
        - bearerAuth: []
      parameters:
        - name: riskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of risk sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskSourceListResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/risks/{riskId}/treatments:
    get:
      operationId: listTreatments
      tags: [treatments]
      summary: List treatments for a risk
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
      responses:
        "200":
          description: List of treatments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TreatmentListResponse"
    post:
      operationId: createTreatment
      tags: [treatments]
      summary: Create treatment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTreatmentRequest"
      responses:
        "201":
          description: Treatment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Treatment"

  /v1/risks/{riskId}/treatments/{id}:
    put:
      operationId: updateTreatment
      tags: [treatments]
      summary: Update treatment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTreatmentRequest"
      responses:
        "200":
          description: Treatment updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Treatment"
    delete:
      operationId: deleteTreatment
      tags: [treatments]
      summary: Delete treatment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Treatment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /v1/risks/{riskId}/treatments/{id}/status-events:
    get:
      operationId: listTreatmentStatusEvents
      tags: [treatments]
      summary: List status change history for a treatment
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: List of status change events
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/TreatmentStatusEvent"

  /v1/risks/{riskId}/acceptance-memoranda:
    get:
      operationId: listAcceptanceMemorandum
      tags: [risks]
      summary: List acceptance memoranda for a risk
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
      responses:
        "200":
          description: List of acceptance memoranda
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptanceMemorandaListResponse"

  /v1/risks/{riskId}/acceptance-memoranda/generate:
    post:
      operationId: generateAcceptanceMemorandum
      tags: [risks]
      summary: Generate an AI-drafted acceptance memorandum for a risk
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                treatmentId:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Memorandum generated and saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptanceMemorandum"
        "422":
          description: AI unavailable

  /v1/risks/{riskId}/acceptance-memoranda/{memorandumId}/approve:
    post:
      operationId: approveAcceptanceMemorandum
      tags: [risks]
      summary: Approve an acceptance memorandum (risk_executive or admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
        - name: memorandumId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Memorandum approved and risk transitioned to accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptanceMemorandum"

  /v1/risks/{riskId}/acceptance-memoranda/{memorandumId}/reject:
    post:
      operationId: rejectAcceptanceMemorandum
      tags: [risks]
      summary: Reject an acceptance memorandum (risk_executive or admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
        - name: memorandumId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectMemorandumBody"
      responses:
        "200":
          description: Memorandum rejected and risk transitioned back to open
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptanceMemorandum"

  /v1/risks/{riskId}/kris:
    get:
      operationId: listKRIs
      tags: [kris]
      summary: List KRIs for a risk
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
      responses:
        "200":
          description: List of KRIs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KRIListResponse"
    post:
      operationId: createKRI
      tags: [kris]
      summary: Create KRI
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKRIRequest"
      responses:
        "201":
          description: KRI created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KRI"

  /v1/risks/{riskId}/kris/{id}:
    put:
      operationId: updateKRI
      tags: [kris]
      summary: Update KRI value and thresholds
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKRIRequest"
      responses:
        "200":
          description: KRI updated with breach detection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KRIWithBreach"
    delete:
      operationId: deleteKRI
      tags: [kris]
      summary: Delete KRI
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: KRI deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/risks/{riskId}/incidents:
    get:
      operationId: listIncidents
      tags: [incidents]
      summary: List incidents for a risk
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
      responses:
        "200":
          description: List of incidents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncidentListResponse"
    post:
      operationId: createIncident
      tags: [incidents]
      summary: Create incident
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncidentRequest"
      responses:
        "201":
          description: Incident created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /v1/risks/{riskId}/incidents/{id}:
    put:
      operationId: updateIncident
      tags: [incidents]
      summary: Update incident
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateIncidentRequest"
      responses:
        "200":
          description: Incident updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"
    delete:
      operationId: deleteIncident
      tags: [incidents]
      summary: Delete incident
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Incident deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/risks/{riskId}/reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews for a risk
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
      responses:
        "200":
          description: List of reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Schedule a review
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /v1/risks/{riskId}/reviews/{id}/complete:
    put:
      operationId: completeReview
      tags: [reviews]
      summary: Complete a review
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/riskId"
        - $ref: "#/components/parameters/id"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
      responses:
        "200":
          description: Review completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /v1/reviews/overdue:
    get:
      operationId: listOverdueReviews
      tags: [reviews]
      summary: List overdue reviews
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Overdue reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewListResponse"

  /v1/vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List vendors
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/VendorStatus"
        - name: tier
          in: query
          schema:
            $ref: "#/components/schemas/VendorTier"
        - name: search
          in: query
          schema:
            type: string
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/limit"
      responses:
        "200":
          description: Paginated list of vendors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorListResponse"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create vendor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorRequest"
      responses:
        "201":
          description: Vendor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /v1/vendors/{id}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get vendor
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Vendor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    put:
      operationId: updateVendor
      tags: [vendors]
      summary: Update vendor
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorRequest"
      responses:
        "200":
          description: Vendor updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    delete:
      operationId: deleteVendor
      tags: [vendors]
      summary: Delete vendor
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Vendor deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"

  /v1/vendors/{id}/transition:
    post:
      operationId: transitionVendor
      tags: [vendors]
      summary: Transition vendor lifecycle status
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetStatus:
                  $ref: "#/components/schemas/VendorStatus"
                notes:
                  type: string
              required:
                - targetStatus
      responses:
        "200":
          description: Vendor transitioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
        "409":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RFC7807Error"

  /v1/vendors/{id}/status-events:
    get:
      operationId: listVendorStatusEvents
      tags: [vendors]
      summary: List vendor lifecycle status events
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Vendor status events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VendorStatusEventListResponse"

  /v1/vendors/{id}/risk-score:
    post:
      operationId: calculateVendorRiskScore
      tags: [vendors]
      summary: Calculate vendor risk score
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: Risk score calculated
          content:
            application/json:
              schema:
                type: object
                properties:
                  riskScore:
                    type: number
                  vendor:
                    $ref: "#/components/schemas/Vendor"

  /v1/vendors/{vendorId}/questionnaires:
    get:
      operationId: listQuestionnaires
      tags: [questionnaires]
      summary: List questionnaires for a vendor
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/vendorId"
      responses:
        "200":
          description: List of questionnaires
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionnaireListResponse"
    post:
      operationId: createQuestionnaire
      tags: [questionnaires]
      summary: Create questionnaire
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/vendorId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionnaireRequest"
      responses:
        "201":
          description: Questionnaire created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Questionnaire"

  /v1/vendors/{vendorId}/questionnaires/{qId}/ai-questions:
    post:
      operationId: generateAiQuestions
      tags: [questionnaires]
      summary: Generate AI follow-up questions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/vendorId"
        - name: qId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Questionnaire with AI-generated questions appended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Questionnaire"
        "503":
          description: LLM unavailable
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /v1/vendors/{vendorId}/questionnaires/{qId}/validate-answers:
    post:
      operationId: validateQuestionnaireAnswers
      tags: [questionnaires]
      summary: Validate questionnaire answers against public knowledge
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/vendorId"
        - name: qId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Validation flags
          content:
            application/json:
