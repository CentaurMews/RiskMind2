components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    riskId:
      name: riskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    vendorId:
      name: vendorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    frameworkId:
      name: frameworkId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    controlId:
      name: controlId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    page:
      name: page
      in: query
      schema:
        type: integer
        default: 1
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 20

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RFC7807Error"
    Conflict:
      description: Conflict - invalid state transition or duplicate
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RFC7807Error"

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
        database:
          type: string
      required:
        - status

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        tenantSlug:
          type: string
      required:
        - email
        - password
        - tenantSlug

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required:
        - accessToken
        - refreshToken
        - user

    RefreshRequest:
      type: object
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken

    TokenPair:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
      required:
        - accessToken
        - refreshToken

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin, risk_manager, risk_owner, auditor, viewer, vendor]
        tenantId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - role
        - tenantId

    RFC7807Error:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
      required:
        - type
        - title
        - status

    DeleteResponse:
      type: object
      properties:
        deleted:
          type: boolean
        id:
          type: string
          format: uuid

    RiskStatus:
      type: string
      enum: [draft, open, mitigated, accepted, closed]

    RiskCategory:
      type: string
      enum: [operational, financial, compliance, strategic, technology, reputational]

    Risk:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        category:
          $ref: "#/components/schemas/RiskCategory"
        status:
          $ref: "#/components/schemas/RiskStatus"
        ownerId:
          type: string
          format: uuid
          nullable: true
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
        impact:
          type: integer
          minimum: 1
          maximum: 5
        residualLikelihood:
          type: integer
          nullable: true
        residualImpact:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateRiskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          $ref: "#/components/schemas/RiskCategory"
        status:
          $ref: "#/components/schemas/RiskStatus"
        ownerId:
          type: string
          format: uuid
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
        impact:
          type: integer
          minimum: 1
          maximum: 5
      required:
        - title
        - category

    UpdateRiskRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          $ref: "#/components/schemas/RiskCategory"
        status:
          $ref: "#/components/schemas/RiskStatus"
        ownerId:
          type: string
          format: uuid
        likelihood:
          type: integer
        impact:
          type: integer
        residualLikelihood:
          type: integer
        residualImpact:
          type: integer

    RiskListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Risk"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    HeatmapCell:
      type: object
      properties:
        likelihood:
          type: integer
        impact:
          type: integer
        risks:
          type: array
          items:
            $ref: "#/components/schemas/Risk"

    HeatmapResponse:
      type: object
      properties:
        cells:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapCell"

    TreatmentStrategy:
      type: string
      enum: [mitigate, transfer, accept, avoid]

    TreatmentStatus:
      type: string
      enum: [planned, in_progress, completed, cancelled]

    Treatment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        riskId:
          type: string
          format: uuid
        strategy:
          $ref: "#/components/schemas/TreatmentStrategy"
        description:
          type: string
          nullable: true
        status:
          $ref: "#/components/schemas/TreatmentStatus"
        ownerId:
          type: string
          format: uuid
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        cost:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateTreatmentRequest:
      type: object
      properties:
        strategy:
          $ref: "#/components/schemas/TreatmentStrategy"
        description:
          type: string
        status:
          $ref: "#/components/schemas/TreatmentStatus"
        ownerId:
          type: string
          format: uuid
        dueDate:
          type: string
          format: date-time
        cost:
          type: string
      required:
        - strategy

    TreatmentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Treatment"

    KRI:
      type: object
      properties:
        id:
          type: string
          format: uuid
        riskId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        warningThreshold:
          type: string
          nullable: true
        criticalThreshold:
          type: string
          nullable: true
        currentValue:
          type: string
          nullable: true
        unit:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    KRIWithBreach:
      allOf:
        - $ref: "#/components/schemas/KRI"
        - type: object
          properties:
            breach:
              type: string
              nullable: true
              enum: [warning, critical]

    CreateKRIRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        warningThreshold:
          type: string
        criticalThreshold:
          type: string
        currentValue:
          type: string
        unit:
          type: string
      required:
        - name

    KRIListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/KRI"

    IncidentSeverity:
      type: string
      enum: [critical, high, medium, low]

    Incident:
      type: object
      properties:
        id:
          type: string
          format: uuid
        riskId:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        description:
          type: string
          nullable: true
        severity:
          $ref: "#/components/schemas/IncidentSeverity"
        reportedBy:
          type: string
          format: uuid
          nullable: true
        occurredAt:
          type: string
          format: date-time
          nullable: true
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateIncidentRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        severity:
          $ref: "#/components/schemas/IncidentSeverity"
        occurredAt:
          type: string
          format: date-time
      required:
        - title

    UpdateIncidentRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        severity:
          $ref: "#/components/schemas/IncidentSeverity"
        resolvedAt:
          type: string
          format: date-time

    IncidentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Incident"

    ReviewStatus:
      type: string
      enum: [scheduled, in_progress, completed, overdue]

    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        riskId:
          type: string
          format: uuid
        reviewerId:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: "#/components/schemas/ReviewStatus"
        dueDate:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateReviewRequest:
      type: object
      properties:
        reviewerId:
          type: string
          format: uuid
        dueDate:
          type: string
          format: date-time
        notes:
          type: string
      required:
        - dueDate

    ReviewListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Review"

    VendorStatus:
      type: string
      enum: [onboarding, approved, active, suspended, offboarded]

    VendorTier:
      type: string
      enum: [critical, high, medium, low]

    Vendor:
      type: object
