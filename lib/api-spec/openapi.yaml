        status:
          $ref: "#/components/schemas/VendorStatus"
        category:
          type: string
          nullable: true
        contactEmail:
          type: string
          nullable: true
        contactName:
          type: string
          nullable: true
        riskScore:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateVendorRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        tier:
          $ref: "#/components/schemas/VendorTier"
        category:
          type: string
        contactEmail:
          type: string
